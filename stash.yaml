    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Final.png
    type: select
    proxies:
      - 选择代理
      - DIRECT

  - name: HK 香港
    filter: "澳门|🇲🇴|港|🇭🇰|HK|(?i)Hong"
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Hong_Kong.png
    interval: 120
    lazy: true
    tolerance: 50
    type: url-test
    include-all: true

  - name: TW 台湾
    filter: "台|🇹🇼|湾|TW|(?i)Taiwan"
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Taiwan.png
    interval: 120
    lazy: true
    tolerance: 50
    type: url-test
    include-all: true

  - name: SG 新加坡
    filter: "新加坡|坡|狮城|🇸🇬|SG|(?i)Singapore"
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Singapore.png
    interval: 120
    lazy: true
    tolerance: 50
    type: url-test
    include-all: true

  - name: JP 日本
    filter: "日|🇯🇵|东京|JP|(?i)Japan"
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Japan.png
    interval: 120
    lazy: true
    tolerance: 50
    type: url-test
    include-all: true

  - name: US 美国
    filter: "美|🇺🇲|US|(?i)States|America"
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/United_States.png
    interval: 120
    lazy: true
    tolerance: 50
    type: url-test
    include-all: true

  - name: 自动选择
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Auto.png
    interval: 120
    lazy: true
    tolerance: 50
    type: url-test
    include-all: true

  - name: 手动选择
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Static.png
    interval: 120
    lazy: true
    type: select
    include-all: true

rules:
  - DOMAIN-KEYWORD,telegram,US 美国
  - DOMAIN-KEYWORD,telegram,telegram
  - SCRIPT,quic,REJECT
  - GEOSITE,netflix,Netflix
  - GEOSITE,disney,Disney+
  - GEOSITE,spotify,Spotify
  - GEOSITE,speedtest,Speedtest
  - GEOSITE,github,选择代理
  - GEOSITE,telegram,选择代理
  - GEOSITE,youtube,YouTube
  - GEOSITE,google,选择代理
  - GEOSITE,twitter,选择代理
  - GEOSITE,instagram,选择代理
  - GEOSITE,facebook,选择代理
  - GEOSITE,steam@cn,DIRECT
  - GEOSITE,steam,选择代理
  - GEOSITE,microsoft@cn,DIRECT
  - GEOSITE,microsoft,选择代理
  - GEOIP,LAN,DIRECT
  - GEOIP,CN,DIRECT
  - MATCH,默认

script:
  shortcuts:
    quic: network == 'udp' and dst_port == 443

dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16

  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  nameserver:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
    - https://dns.google/dns-query
    - https://cloudflare-dns.com/dns-query

  fallback:
    - https://1.0.0.1/dns-query
    - https://8.8.4.4/dns-query
    - tls://1.1.1.1:853
    - tls://8.8.8.8:853

  fallback-filter:
    geoip: true
    geoip-code: CN

  nameserver-policy:
    "geosite:cn":
      - https://223.5.5.5/dns-query
      - https://120.53.53.53/dns-query

  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "*.localdomain"
    - "*.home.arpa"
    - time.apple.com
    - time-ios.apple.com
    - "*.ntp.org"

log-level: warning
mode: rule
