mode: rule
log-level: warning

proxy-providers:
  服务商1:
    type: http
    url: https://fba02.fbsubcn01.cc:2096/flydsubal/8u9sl8dgcyrotzrr?clash=1&extend=1
    interval: 600
    health-check:
      enable: true
      interval: 300
      url: http://www.gstatic.com/generate_204

  服务商2:
    type: http
    url: https://cdn2.xmrth.one/s/i4g1esijavvb-22669856?clash=1
    interval: 600
    health-check:
      enable: true
      interval: 300
      url: http://www.gstatic.com/generate_204

  服务商3:
    type: http
    url: https://gjsdtf.yau96.com/config?token=302dfcfbb75bac92e8a8811af98f8eef
    interval: 600
    health-check:
      enable: true
      interval: 300
      url: http://www.gstatic.com/generate_204

proxy-groups:
  - name: 选择代理
    type: select
    proxies:
      - 自动选择
      - 手动选择
      - HK 香港
      - TW 台湾
      - SG 新加坡
      - JP 日本
      - US 美国
      - DIRECT

  - name: 自动选择
    type: url-test
    use:
      - 服务商1
      - 服务商2
      - 服务商3
    url: http://www.gstatic.com/generate_204
    interval: 300

  - name: 手动选择
    type: select
    use:
      - 服务商1
      - 服务商2
      - 服务商3

  - name: HK 香港
    type: url-test
    use:
      - 服务商1
      - 服务商2
      - 服务商3
    filter: "港|HK|Hong"
    url: http://www.gstatic.com/generate_204
    interval: 300

  - name: TW 台湾
    type: url-test
    use:
      - 服务商1
      - 服务商2
      - 服务商3
    filter: "台|TW|Taiwan"
    url: http://www.gstatic.com/generate_204
    interval: 300

  - name: SG 新加坡
    type: url-test
    use:
      - 服务商1
      - 服务商2
      - 服务商3
    filter: "新加坡|SG|Singapore"
    url: http://www.gstatic.com/generate_204
    interval: 300

  - name: JP 日本
    type: url-test
    use:
      - 服务商1
      - 服务商2
      - 服务商3
    filter: "日|JP|Japan"
    url: http://www.gstatic.com/generate_204
    interval: 300

  - name: US 美国
    type: url-test
    use:
      - 服务商1
      - 服务商2
      - 服务商3
    filter: "美|US|America"
    url: http://www.gstatic.com/generate_204
    interval: 300

  - name: Netflix
    type: select
    proxies:
      - 自动选择
      - HK 香港
      - JP 日本
      - SG 新加坡
      - US 美国
      - DIRECT

  - name: YouTube
    type: select
    proxies:
      - 自动选择
      - HK 香港
      - JP 日本
      - SG 新加坡
      - US 美国
      - DIRECT

  - name: Spotify
    type: select
    proxies:
      - 自动选择
      - HK 香港
      - JP 日本
      - SG 新加坡
      - US 美国
      - DIRECT

  - name: 默认
    type: select
    proxies:
      - 选择代理
      - DIRECT

rules:
  - GEOSITE,netflix,Netflix
  - GEOSITE,youtube,YouTube
  - GEOSITE,spotify,Spotify
  - GEOSITE,telegram,选择代理
  - GEOSITE,google,选择代理
  - GEOSITE,twitter,选择代理
  - GEOSITE,facebook,选择代理
  - GEOSITE,instagram,选择代理
  - GEOSITE,github,选择代理
  - GEOIP,CN,DIRECT
  - MATCH,默认

dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16

  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  nameserver:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
