proxy-groups:
  - name: 选择代理
    type: select
    proxies:
      - 自动选择
      - 手动选择
      - HK 香港
      - TW 台湾
      - SG 新加坡
      - JP 日本
      - US 美国
      - DIRECT

  - name: Netflix
    type: select
    proxies:
      - 自动选择
      - 手动选择
      - HK 香港
      - TW 台湾
      - SG 新加坡
      - JP 日本
      - US 美国
      - DIRECT

  - name: Disney+
    type: select
    proxies:
      - 自动选择
      - 手动选择
      - HK 香港
      - TW 台湾
      - SG 新加坡
      - JP 日本
      - US 美国
      - DIRECT

  - name: Spotify
    type: select
    proxies:
      - 自动选择
      - 手动选择
      - HK 香港
      - TW 台湾
      - SG 新加坡
      - JP 日本
      - US 美国
      - DIRECT

  - name: YouTube
    type: select
    proxies:
      - 自动选择
      - 手动选择
      - HK 香港
      - TW 台湾
      - SG 新加坡
      - JP 日本
      - US 美国
      - DIRECT

  - name: Speedtest
    type: select
    proxies:
      - 自动选择
      - 手动选择
      - HK 香港
      - TW 台湾
      - SG 新加坡
      - JP 日本
      - US 美国
      - DIRECT

  - name: 默认
    type: select
    proxies:
      - 选择代理
      - DIRECT


  - name: HK 香港
    type: url-test
    include-all: true
    filter: "港|HK|Hong"
    interval: 120
    tolerance: 50

  - name: TW 台湾
    type: url-test
    include-all: true
    filter: "台|TW|Taiwan"
    interval: 120
    tolerance: 50

  - name: SG 新加坡
    type: url-test
    include-all: true
    filter: "新加坡|SG|Singapore"
    interval: 120
    tolerance: 50

  - name: JP 日本
    type: url-test
    include-all: true
    filter: "日|JP|Japan"
    interval: 120
    tolerance: 50

  - name: US 美国
    type: url-test
    include-all: true
    filter: "美|US|America"
    interval: 120
    tolerance: 50

  - name: 自动选择
    type: url-test
    include-all: true
    interval: 120
    tolerance: 50

  - name: 手动选择
    type: select
    include-all: true


rules:
  - DOMAIN-KEYWORD,telegram,选择代理
  - SCRIPT,quic,REJECT

  - GEOSITE,netflix,Netflix
  - GEOSITE,disney,Disney+
  - GEOSITE,spotify,Spotify
  - GEOSITE,speedtest,Speedtest

  - GEOSITE,github,选择代理
  - GEOSITE,telegram,选择代理

  - GEOSITE,youtube,YouTube
  - GEOSITE,google,选择代理
  - GEOSITE,twitter,选择代理
  - GEOSITE,instagram,选择代理
  - GEOSITE,facebook,选择代理

  - GEOSITE,steam@cn,DIRECT
  - GEOSITE,steam,选择代理

  - DOMAIN-SUFFIX,push.apple.com,DIRECT

  - GEOIP,LAN,DIRECT
  - GEOIP,CN,DIRECT
  - MATCH,默认


script:
  shortcuts:
    quic: network == 'udp' and dst_port == 443


dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16

  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "*.msftconnecttest.com"
    - "*.msftncsi.com"
    - "localhost.ptlogin2.qq.com"

  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  nameserver:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
    - https://9.9.9.9/dns-query


mode: rule
log-level: warning
